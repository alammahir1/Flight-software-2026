; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; Upload settings
upload_protocol = teensy-gui

; Serial Monitor options
monitor_speed = 115200

; Library dependencies
lib_deps =
    adafruit/Adafruit INA260 Library@^1.5.0 ; voltage and current sensor library
    constiko/RTC RV-3028-C7 Arduino Library@^2.1.0 ; clock library
    andrewrapp/XBee; ; xbee library
    paulstoffregen/Time@^1.6.1 ; time library
    duracopter/MAVLink v2 C library@^2.0
    https://github.com/mavlink/c_library_v2


